name: 基金均线提醒

on:
  schedule:
    # 工作日 9:30 运行（UTC 时间 1:30）
    - cron: '30 1 * * 1-5'
  workflow_dispatch:  # 支持手动触发

jobs:
  notify:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 安装依赖
      run: |
        pip install akshare
    
    - name: 运行提醒脚本
      env:
        WECOM_KEY: ${{ secrets.WECOM_KEY }}
        NOTIFY_TYPE: wecom
      run: |
        python notify.py
