name: 股息率定投信号

on:
  schedule:
    # 工作日 9:30 运行（UTC 时间 1:30）
    - cron: '30 1 * * 1-5'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - run: pip install akshare
    
    - run: python notify.py
      env:
        WECOM_KEY: ${{ secrets.WECOM_KEY }}
        NOTIFY_TYPE: wecom
